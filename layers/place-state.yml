id: place-state
type: symbol
source: geolonia
source-layer: place
filter:
  - all
  - - ==
    - class
    - state
layout:
  text-font:
    - Noto Sans Universal Regular
  text-size:
    stops:
      - - 4
        - 12
      - - 8
        - 16
  text-field: '{name}'
  text-max-width: 6
  text-padding: 30
  text-letter-spacing: 0.1
paint:
  text-color: '#607080'
  text-halo-width: 2.5
  text-halo-color: '#f0f2f4'
