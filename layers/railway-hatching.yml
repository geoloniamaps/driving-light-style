id: railway-hatching
type: line
source: geolonia
source-layer: transportation
minzoom: 13
filter:
  - all
  - - ==
    - class
    - rail
  - - '!has'
    - service
layout:
  line-cap: butt
  line-join: bevel
paint:
  line-color: '#c0c4c8'
  line-dasharray:
    - 1
    - 4
  line-width:
    stops:
      - - 10
        - 2
      - - 14
        - 4
      - - 18
        - 6
