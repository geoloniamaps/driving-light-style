id: highway-path
type: line
source: geolonia
source-layer: transportation
minzoom: 16
filter:
  - all
  - - ==
    - $type
    - LineString
  - - '!in'
    - brunnel
    - bridge
    - tunnel
  - - ==
    - class
    - path
layout:
  line-cap: butt
  line-join: bevel
paint:
  line-color: '#c8ccd0'
  line-width:
    base: 3
    stops:
      - - 16
        - 1
      - - 17
        - 2
      - - 18
        - 3
