id: road-name
type: symbol
source: geolonia
source-layer: transportation_name
minzoom: 11
filter:
  - all
  - - ==
    - network
    - road
  - - in
    - class
    - trunk
    - primary
    - secondary
    - tertiary
  - - '!in'
    - brunnel
    - tunnel
layout:
  text-font:
    - Noto Sans CJK JP Bold
  text-size:
    stops:
      - - 11
        - 11
      - - 14
        - 14
      - - 18
        - 16
  text-field: '{name}'
  text-max-width: 8
  text-padding: 50
  symbol-placement: line
  symbol-spacing:
    base: 1000
    stops:
      - - 10
        - 800
      - - 12
        - 600
      - - 15
        - 400
paint:
  text-color: '#303840'
  text-halo-width: 2.5
  text-halo-color: '#ffffff'
