id: place-village
type: symbol
source: geolonia
source-layer: place
minzoom: 12
filter:
  - all
  - - ==
    - class
    - village
layout:
  text-font:
    - Noto Sans Universal Regular
  text-size: 13
  text-field: '{name}'
  text-max-width: 6
  text-padding: 20
  text-letter-spacing: 0.05
paint:
  text-color: '#485060'
  text-halo-width: 2.5
  text-halo-color: '#f0f2f4'
