id: tunnel
type: line
source: geolonia
source-layer: transportation
minzoom: 11
filter:
  - all
  - - ==
    - brunnel
    - tunnel
  - - in
    - class
    - primary
    - secondary
    - tertiary
    - trunk
    - motorway
layout:
  line-cap: butt
  line-join: bevel
paint:
  line-color: '#e0e4e8'
  line-dasharray:
    - 4
    - 2
  line-width:
    - interpolate
    - - exponential
      - 0.9
    - - zoom
    - 6
    - 0.5
    - 12
    - 1.5
    - 14
    - 3.5
    - 16
    - 10
    - 18
    - 18
