id: highway-minor-casing
type: line
source: geolonia
source-layer: transportation
minzoom: 14
filter:
  - all
  - - ==
    - $type
    - LineString
  - - '!='
    - brunnel
    - tunnel
  - - in
    - class
    - minor
    - service
    - track
layout:
  line-cap: butt
  line-join: bevel
paint:
  line-color: '#c8ccd0'
  line-width:
    - interpolate
    - - linear
    - - zoom
    - 14
    - 0
    - 14.5
    - 4
    - 16
    - 10
    - 20
    - 20
